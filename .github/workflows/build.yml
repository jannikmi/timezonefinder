name: build

# Triggers:
# - push to master, version tags, or publishing a GitHub Release (fallback if a tag push did not start a run).
# GitHub limits: tag push webhooks are not emitted when more than three tags are pushed in one operation.
# Tag push runs use the workflow file as it exists in the commit the tag points to (the workflow must exist there).
on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '**'
  release:
    types: [published]
  workflow_dispatch:

env:
  # Use one base Python version with future-proof abi3 support
  CIBW_BUILD_VERSIONS: "cp311-*"

jobs:
  pre-commit-hooks:
    name: run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run pre-commit hook
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    strategy:
      # By default, GitHub will maximize the number of jobs run in parallel
      # depending on the available runners on GitHub-hosted virtual machines.
      # max-parallel: 8
      fail-fast: false
      matrix:
        # all officially supported Python versions should be tested
        # NOTE: need to match the versions in pyproject.toml > tox.ini
        include:
          - python-version: "3.11"
            tox-env: "py311,py311-numba,py311-pytz"
          - python-version: "3.12"
            tox-env: "py312,py312-numba,py312-pytz,docs"
          - python-version: "3.13"
            tox-env: "py313,py313-numba,py313-pytz"
          - python-version: "3.14"
            tox-env: "py314,py314-numba,py314-pytz,slow"
    env:
      TOX_SKIP_MISSING_INTERPRETERS: False
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tox
        run: uv run tox -e ${{ matrix.tox-env }}

  make-wheels:
    name: Make ${{ matrix.os }} ${{ matrix.cibw_arch }} ${{ matrix.manylinux_tag }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # manylinux2014 (glibc >= 2.17) + musllinux
          - os: ubuntu-latest
            cibw_arch: native
            manylinux_image: quay.io/pypa/manylinux2014_x86_64:2026.04.25-0
            manylinux_tag: manylinux2014
            cibw_skip: ""
          # manylinux_2_28 (glibc >= 2.28)
          - os: ubuntu-latest
            cibw_arch: native
            manylinux_image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.25-0
            manylinux_tag: manylinux_2_28
            cibw_skip: "*-musllinux*"
      fail-fast: false

    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v6

      - name: "Build wheels"
        uses: pypa/cibuildwheel@v4.0.0
        with:
          output-dir: dist
        env:
          # https://github.com/pypa/cibuildwheel/blob/v3.4.1/cibuildwheel/resources/pinned_docker_images.cfg
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
          CIBW_MUSLLINUX_X86_64_IMAGE: quay.io/pypa/musllinux_1_1_x86_64:2024.10.26-1
          CIBW_BUILD: ${{ env.CIBW_BUILD_VERSIONS }}
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_SKIP: ${{ matrix.cibw_skip }}
          CIBW_BUILD_FRONTEND: pip
          CIBW_BUILD_VERBOSITY: 1

      - name: "Upload wheel as artifact"
        uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.os }}-${{ matrix.cibw_arch }}-${{ matrix.manylinux_tag }}-wheel
          path: "./**/dist/*.whl"

  make-sdist:
    name: Make source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - run: uv build -v --sdist

    - uses: actions/upload-artifact@v7
      with:
        name: artifact-source-dist
        path: "./**/dist/*.tar.gz"

  end-to-end-test:
    runs-on: ubuntu-latest
    needs: [make-wheels]
    strategy:
        fail-fast: false
        matrix:
            uv-python-version: ["cp311", "cp312", "cp313", "cp314"]
    steps:
      # Only install uv without creating a project
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          ignore-empty-workdir: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Copy artifacts to dist/ folder
        run: |
          find . -name 'artifact-*.zip' -print -exec unzip '{}' \;
          mkdir -p dist/
          find . -name '*.tar.gz' -exec mv '{}' dist/ \;
          find . -name '*.whl' -exec mv '{}' dist/ \;
          ls -lR dist/

      - name: Run end-to-end test
        run: |
            find .
            uv init --name e2e --python ${{ matrix.uv-python-version }} --bare
            uv add ./dist/timezonefinder*manylinux_2_28*whl
            uv tree
            uv run python3 -c 'from timezonefinder import TimezoneFinder; tf = TimezoneFinder(); result = tf.timezone_at(lat=40.5, lng=11.7); assert(result == "Etc/GMT-1")'
            uv run python3 -c 'from timezonefinder.utils import clang_extension_loaded; assert(clang_extension_loaded)'

      # Checks issue #418
      - name: Verify manylinux_2_28 wheel
        run: |
            pip download \
              --platform manylinux_2_28_x86_64 --python-version 3.14 --implementation cp \
              --only-binary :all: --no-index --find-links ./dist --no-deps -d /tmp/platform_test timezonefinder
            ls /tmp/platform_test/timezonefinder*manylinux_2_28*.whl

  release:
    name: Create release and publish to TestPyPI
    runs-on: ubuntu-latest
    # Note: only run, when test publishing worked
    needs: [test, make-wheels, make-sdist, end-to-end-test, pre-commit-hooks]
    # Run on pushes to master or tag pushes to create releases.
    # The verification step below ensures tags are only released if on master.
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    permissions:
        id-token: write
        contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        # Fetch full history to check remote branches for verification.
        with:
          fetch-depth: 0

      # Verify that the commit is on the master branch to prevent releases from other branches.
      # This is crucial because tags can be pushed from any branch, but releases should only occur from master.
      - name: Verify commit is on master branch
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            if ! git branch -r --contains HEAD | grep -q origin/master; then
              echo "Tag is not on master branch. Aborting release."
              exit 1
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Upgrade pip version
        run: pip install --upgrade pip

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Fetch version
        id: fetch_version
        run: echo "version_nr=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Copy artifacts to dist/ folder
        run: |
          find . -name 'artifact-*.zip' -print -exec unzip '{}' \;
          mkdir -p dist/
          find . -name '*.tar.gz' -exec mv '{}' dist/ \;
          find . -name '*.whl' -exec mv '{}' dist/ \;
          ls -lR dist/

      # TODO re-enable Test PyPI publishing. disabled due to project size limits
      # -   name: Test PyPI Publishing
      #     # NOTE: PRs from forks fail due to: "missing or insufficient OIDC token permissions,
      #     #  the ACTIONS_ID_TOKEN_REQUEST_TOKEN environment variable was unset"
      #     # -> test publishing cannot be triggered in PRs?!
      #     uses: pypa/gh-action-pypi-publish@release/v1
      #     with:
      #         password: ${{ secrets.TEST_PYPI_DEPLOYMENT_API_KEY }}
      #         repository-url: https://test.pypi.org/legacy/
      #         skip-existing: true

      - name: Create GitHub Release
        id: create_gh_release
        uses: ncipollo/release-action@v1
        env:
          VERSION: ${{ steps.fetch_version.outputs.version_nr }}
        with:
          tag: ${{env.VERSION}}
          name: Release ${{env.VERSION}}
          draft: false
          prerelease: false
          skipIfReleaseExists: true
          artifacts: "dist/timezonefinder*.whl,dist/timezonefinder*.tar.gz"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
        id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Upgrade pip version
        run: pip install --upgrade pip

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Fetch version
        id: fetch_version
        run: echo "version_nr=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Copy artifacts to dist/ folder
        run: |
          find . -name 'artifact-*' -exec unzip '{}' \;
          mkdir -p dist/
          find . -name '*.tar.gz' -exec mv '{}' dist/ \;
          find . -name '*.whl' -exec mv '{}' dist/ \;
          ls -lR dist/

      - name: PyPI Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_DEPLOYMENT_API_KEY }}
          skip-existing: true
